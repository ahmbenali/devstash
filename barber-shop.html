<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grooming Lounge | Premium Barbershop</title>

    <!-- Fonts: Cinzel (Premium Headers) & Manrope (Modern Body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Manrope:wght@300;400;500;600&display=swap"
      rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              charcoal: '#0a0a0a',
              surface: '#171717',
              'surface-light': '#262626',
              bronze: '#d97706',
              bronzeLight: '#f59e0b',
              cream: '#f5f5f4',
              stone: '#44403c'
            },
            fontFamily: {
              serif: ['Cinzel', 'serif'],
              sans: ['Manrope', 'sans-serif'],
            },
            backgroundImage: {
              'hero-pattern': "linear-gradient(to bottom, rgba(10,10,10,0.3), rgba(10,10,10,1)), url('https://images.unsplash.com/photo-1585747860715-2ba37e788b70?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80')",
            }
          }
        }
      }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Supabase Client -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      /* Custom Styles & Utilities */
      body {
        background-color: #0a0a0a;
        color: #f5f5f4;
        -webkit-font-smoothing: antialiased;
      }

      .glass-panel {
        background: rgba(23, 23, 23, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .gold-gradient-text {
        background: linear-gradient(135deg, #d97706 0%, #fbbf24 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #0a0a0a;
      }

      ::-webkit-scrollbar-thumb {
        background: #262626;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #44403c;
      }

      /* Animation utilities */
      .fade-in {
        animation: fadeIn 0.5s ease-out;
      }

      .slide-up {
        animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }

        to {
          opacity: 1;
        }
      }

      @keyframes slideUp {
        from {
          transform: translateY(20px);
          opacity: 0;
        }

        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script type="text/babel">
      /*******************************************************
       * SUPABASE SETUP & UTILS
       *******************************************************/
      const { useState, useEffect, useContext, createContext, useMemo } = React;

      // Global Supabase Instance
      let supabase = null;

      // --- Types & Interfaces (represented as JSDoc/Logic) ---
      // services: { id, name, description, duration_minutes, price, is_active, created_at }
      // appointments: { id, full_name, email, phone, service_id, appointment_date, start_time, end_time, status, notes, created_at }
      // ...

      /*******************************************************
       * CONTEXT MANAGEMENT
       *******************************************************/
      const AppContext = createContext(null);

      const AppProvider = ({ children }) => {
        const [user, setUser] = useState(null);
        const [isAdmin, setIsAdmin] = useState(false);
        const [loading, setLoading] = useState(true);
        const [services, setServices] = useState([]);
        const [appointments, setAppointments] = useState([]);
        const [businessHours, setBusinessHours] = useState([]);
        const [blockedDates, setBlockedDates] = useState([]);
        const [settings, setSettings] = useState(null);
        const [toast, setToast] = useState(null); // { message, type: 'success'|'error' }

        // Initialize Supabase and Session
        useEffect(() => {
          const initSupabase = () => {
            const storedUrl = localStorage.getItem('sb_url');
            const storedKey = localStorage.getItem('sb_key');

            if (!storedUrl || !storedKey) {
              setLoading(false);
              return;
            }

            try {
              supabase = window.supabase.createClient(storedUrl, storedKey);

              // Check Session
              supabase.auth.getSession().then(({ data: { session } }) => {
                setUser(session?.user ?? null);
                if (session?.user) checkAdminStatus(session.user.id);
                setLoading(false);
              });

              // Listen for auth changes
              const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
                setUser(session?.user ?? null);
                if (session?.user) checkAdminStatus(session.user.id);
                else setIsAdmin(false);
              });

              return () => subscription.unsubscribe();
            } catch (error) {
              console.error("Supabase Init Error", error);
              showToast("Failed to connect to database. Check config.", "error");
              setLoading(false);
            }
          };

          initSupabase();
        }, []);

        const checkAdminStatus = async (userId) => {
          if (!supabase) return;
          const { data, error } = await supabase
            .from('admin_users')
            .select('*')
            .eq('user_id', userId)
            .single();

          if (data && !error) {
            setIsAdmin(true);
          } else {
            setIsAdmin(false);
          }
        };

        // Data Fetching Helpers
        const fetchServices = async (activeOnly = true) => {
          if (!supabase) return [];
          let query = supabase.from('services').select('*');
          if (activeOnly) query = query.eq('is_active', true);
          const { data, error } = await query;
          if (!error && data) setServices(data);
          return data;
        };

        const fetchAppointments = async () => {
          if (!supabase) return [];
          const { data, error } = await supabase
            .from('appointments')
            .select('*, services(name)')
            .order('appointment_date', { ascending: true });
          if (!error && data) setAppointments(data);
        };

        const fetchSettings = async () => {
          if (!supabase) return;
          const { data, error } = await supabase.from('barbershop_settings').select('*').single();
          if (data && !error) setSettings(data);
        };

        const fetchHours = async () => {
          if (!supabase) return;
          const { data } = await supabase.from('business_hours').select('*');
          if (data) setBusinessHours(data);
        };

        const fetchBlockedDates = async () => {
          if (!supabase) return;
          const { data } = await supabase.from('blocked_dates').select('*');
          if (data) setBlockedDates(data);
        };

        const loadData = () => {
          fetchServices();
          fetchAppointments();
          fetchSettings();
          fetchHours();
          fetchBlockedDates();
        };

        // Trigger data load when supabase is ready
        useEffect(() => {
          if (supabase) loadData();
        }, [supabase]);

        const showToast = (message, type = 'success') => {
          setToast({ message, type });
          setTimeout(() => setToast(null), 3000);
        };

        const value = {
          user, setUser, isAdmin, loading,
          services, appointments, businessHours, blockedDates, settings,
          fetchServices, fetchAppointments, fetchSettings, fetchHours, fetchBlockedDates, loadData,
          showToast, supabase
        };

        return <AppContext.Provider value={value}>{children}</AppContext.Provider>;
      };

      /*******************************************************
       * UI COMPONENTS
       *******************************************************/
      const Icon = ({ name, size = 20, className = "" }) => {
        useEffect(() => {
          lucide.createIcons();
        }, [name]);
        return <i data-lucide={name} width={size} height={size} className={className}></i>;
      };

      const Button = ({ children, onClick, variant = 'primary', className = "", type = "button", disabled = false }) => {
        const baseStyle = "px-6 py-3 rounded-none font-sans font-medium tracking-wide transition-all duration-300 flex items-center justify-center gap-2";
        const variants = {
          primary: "bg-amber-700 text-white hover:bg-amber-600 border border-amber-600 shadow-lg shadow-amber-900/20",
          outline: "bg-transparent text-amber-600 border border-amber-600 hover:bg-amber-900/20",
          ghost: "bg-transparent text-stone-400 hover:text-white hover:bg-white/5",
          danger: "bg-red-900/30 text-red-400 border border-red-900 hover:bg-red-900/50"
        };
        return (
          <button
            type={type}
            onClick={onClick}
            disabled={disabled}
            className={`${baseStyle} ${variants[variant]} ${className} ${disabled ? 'opacity-50 cursor-not-allowed' : ''}`}
          >
            {children}
          </button>
        );
      };

      const Input = ({ label, type = "text", value, onChange, placeholder, required = false, name }) => (
        <div className="space-y-1">
          {label && <label className="text-xs uppercase tracking-widest text-stone-500 font-semibold block">{label}</label>}
          <input
            type={type}
            name={name}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            required={required}
            className="w-full bg-surface border border-stone-800 text-white px-4 py-3 focus:outline-none focus:border-amber-700 transition-colors placeholder-stone-600"
          />
        </div>
      );

      const Modal = ({ isOpen, onClose, title, children }) => {
        if (!isOpen) return null;
        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
            <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={onClose}></div>
            <div className="relative bg-surface border border-stone-700 w-full max-w-lg p-6 shadow-2xl slide-up max-h-[90vh] overflow-y-auto">
              <div className="flex justify-between items-center mb-6 border-b border-stone-800 pb-4">
                <h3 className="text-xl font-serif text-white">{title}</h3>
                <button onClick={onClose} className="text-stone-500 hover:text-white"><Icon name="x" /></button>
              </div>
              {children}
            </div>
          </div>
        );
      };

      const Toast = ({ message, type }) => (
        <div className={`fixed bottom-6 right-6 z-50 px-6 py-4 rounded shadow-xl border-l-4 flex items-center gap-3 slide-up ${type === 'success' ? 'bg-stone-800 border-amber-600 text-white' : 'bg-stone-800 border-red-600 text-white'}`}>
          <Icon name={type === 'success' ? 'check-circle' : 'alert-circle'} />
          <span className="font-medium">{message}</span>
        </div>
      );

      /*******************************************************
       * PUBLIC WEBSITE COMPONENTS
       *******************************************************/
      const Navbar = ({ onBookClick }) => {
        const { settings } = useContext(AppContext);
        return (
          <nav className="fixed w-full z-40 glass-panel border-b-0 border-b-stone-800/50">
            <div className="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
              <div className="flex items-center gap-2">
                <Icon name="scissors" className="text-amber-600" />
                <span className="text-xl font-serif font-bold tracking-wider text-white">
                  {settings?.barbershop_name || "THE GROOMING LOUNGE"}
                </span>
              </div>
              <div className="hidden md:flex items-center gap-8 text-sm font-medium tracking-wide text-stone-300">
                <a href="#services" className="hover:text-amber-500 transition-colors">SERVICES</a>
                <a href="#about" className="hover:text-amber-500 transition-colors">ABOUT</a>
                <Button onClick={onBookClick} variant="primary" className="!py-2 !px-5 text-sm">BOOK NOW</Button>
              </div>
            </div>
          </nav>
        );
      };

      const Hero = ({ onBookClick }) => (
        <section className="relative h-screen min-h-[700px] flex items-center justify-center bg-hero-pattern bg-cover bg-center bg-no-repeat">
          <div className="absolute inset-0 bg-black/40"></div>
          <div className="relative z-10 text-center px-6 max-w-4xl mx-auto slide-up">
            <p className="text-amber-500 tracking-[0.3em] text-sm font-bold uppercase mb-6">Premium Grooming for Gentlemen</p>
            <h1 className="text-5xl md:text-7xl font-serif font-bold text-white mb-8 leading-tight">
              Precision Craft. <br /> <span className="text-stone-400">Classic Style.</span>
            </h1>
            <p className="text-stone-300 text-lg md:text-xl mb-10 max-w-2xl mx-auto font-light leading-relaxed">
              Experience the art of traditional barbering with modern luxury.
              Every cut is a masterpiece.
            </p>
            <Button onClick={onBookClick} className="mx-auto text-lg px-10 py-4">
              RESERVE YOUR CHAIR <Icon name="arrow-right" size={18} />
            </Button>
          </div>
        </section>
      );

      const Services = ({ onSelectService }) => {
        const { services } = useContext(AppContext);
        if (!services.length) return null;
        return (
          <section id="services" className="py-24 bg-charcoal">
            <div className="max-w-7xl mx-auto px-6">
              <div className="text-center mb-16">
                <h2 className="text-3xl md:text-4xl font-serif font-bold text-white mb-4">Our Services</h2>
                <div className="w-16 h-1 bg-amber-600 mx-auto"></div>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                {services.map((service) => (
                  <div key={service.id} className="group bg-surface border border-stone-800 p-8 hover:border-amber-900/50 transition-all duration-300 hover:-translate-y-1 relative overflow-hidden">
                    <div className="absolute top-0 right-0 p-4 opacity-5 group-hover:opacity-10 transition-opacity">
                      <Icon name="scissors" size={80} />
                    </div>
                    <h3 className="text-2xl font-serif text-white mb-3">{service.name}</h3>
                    <p className="text-stone-400 text-sm leading-relaxed mb-6 min-h-[48px]">{service.description}</p>
                    <div className="flex items-center justify-between border-t border-stone-800 pt-6">
                      <div className="flex items-center gap-2 text-stone-500 text-sm">
                        <Icon name="clock" size={16} /> {service.duration_minutes} min
                      </div>
                      <div className="text-amber-600 font-serif text-xl">${service.price}</div>
                    </div>
                    <div className="mt-6">
                      <Button onClick={() => onSelectService(service)} variant="outline" className="w-full text-sm">
                        Select
                      </Button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );
      };

      const About = () => (
        <section id="about" className="py-24 bg-[#0c0c0c]">
          <div className="max-w-7xl mx-auto px-6">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-16 items-center">
              <div className="relative">
                <div className="absolute -top-4 -left-4 w-full h-full border border-amber-900/30"></div>
                <img
                  src="https://images.unsplash.com/photo-1503951914875-452162b7f300?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80"
                  alt="Barber at work"
                  className="relative z-10 w-full h-[600px] object-cover filter grayscale contrast-125"
                />
              </div>
              <div>
                <h2 className="text-3xl md:text-4xl font-serif font-bold text-white mb-6">More Than Just a Haircut</h2>
                <div className="w-16 h-1 bg-amber-600 mb-8"></div>
                <p className="text-stone-400 leading-relaxed mb-6">
                  Founded on the principles of craftsmanship and attention to detail, we provide a sanctuary for the modern gentleman.
                  Our barbers are master artisans trained in the classic techniques of scissor-over-comb, straight-razor shaving, and precision fading.
                </p>
                <p className="text-stone-400 leading-relaxed mb-8">
                  We believe that grooming is an essential ritual. From the hot towel to the final styling powder, every step is designed to elevate your experience.
                </p>
                <div className="grid grid-cols-3 gap-6 text-center border-t border-stone-800 pt-8">
                  <div>
                    <div className="text-3xl font-serif text-amber-600 font-bold mb-1">10+</div>
                    <div className="text-xs uppercase tracking-widest text-stone-500">Years Exp.</div>
                  </div>
                  <div>
                    <div className="text-3xl font-serif text-amber-600 font-bold mb-1">5k+</div>
                    <div className="text-xs uppercase tracking-widest text-stone-500">Happy Clients</div>
                  </div>
                  <div>
                    <div className="text-3xl font-serif text-amber-600 font-bold mb-1">100%</div>
                    <div className="text-xs uppercase tracking-widest text-stone-500">Satisfaction</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
      );

      /*******************************************************
       * BOOKING SYSTEM
       *******************************************************/
      const BookingFlow = ({ initialService, onClose }) => {
        const { supabase, showToast, settings } = useContext(AppContext);
        const [step, setStep] = useState(1);
        const [selectedService, setSelectedService] = useState(initialService || null);
        const [selectedDate, setSelectedDate] = useState(null);
        const [selectedSlot, setSelectedSlot] = useState(null);
        const [slots, setSlots] = useState([]);
        const [clientDetails, setClientDetails] = useState({ full_name: '', email: '', phone: '', notes: '' });
        const [loadingSlots, setLoadingSlots] = useState(false);
        const [submitting, setSubmitting] = useState(false);

        // Fetch slots when date and service are selected
        useEffect(() => {
          if (selectedDate && selectedService) {
            fetchSlots();
          }
        }, [selectedDate, selectedService]);

        const fetchSlots = async () => {
          setLoadingSlots(true);
          setSlots([]);

          try {
            // 1. Get Business Hours
            const dayOfWeek = new Date(selectedDate).getDay(); // 0 (Sun) - 6 (Sat)
            const { data: hours } = await supabase
              .from('business_hours')
              .select('*')
              .eq('weekday', dayOfWeek)
              .single();

            if (!hours || !hours.is_open) {
              setLoadingSlots(false);
              return;
            }

            // 2. Get Blocked Dates
            const { data: blocks } = await supabase
              .from('blocked_dates')
              .select('*')
              .eq('blocked_date', selectedDate);

            if (blocks && blocks.length > 0) {
              setLoadingSlots(false);
              return;
            }

            // 3. Get Existing Appointments
            const { data: appointments } = await supabase
              .from('appointments')
              .select('start_time, end_time, status')
              .eq('appointment_date', selectedDate)
              .in('status', ['pending', 'confirmed']);

            // 4. Generate Slots
            const interval = settings?.slot_interval_minutes || 15;
            const duration = selectedService.duration_minutes;

            // Convert "09:00" to minutes from midnight
            const startMin = timeToMinutes(hours.start_time);
            const endMin = timeToMinutes(hours.end_time);

            const now = new Date();
            const bookingNotice = settings?.booking_notice_hours || 2;
            const noticeTime = new Date(now.getTime() + bookingNotice * 60 * 60 * 1000);

            let generatedSlots = [];
            for (let t = startMin; t + duration <= endMin; t += interval) {
              const slotDate = new Date(selectedDate);
              slotDate.setHours(Math.floor(t / 60), t % 60, 0, 0);

              // Check Notice Period
              if (slotDate < noticeTime) continue;

              const endT = t + duration;

              // Check Overlaps
              const hasOverlap = appointments.some(apt => {
                const aptStart = timeToMinutes(apt.start_time);
                const aptEnd = timeToMinutes(apt.end_time);
                return (t < aptEnd && endT > aptStart);
              });

              if (!hasOverlap) {
                generatedSlots.push({
                  start: t,
                  end: endT,
                  label: `${formatTime(t)} - ${formatTime(endT)}`
                });
              }
            }
            setSlots(generatedSlots);

          } catch (err) {
            console.error(err);
            showToast("Error loading availability", "error");
          } finally {
            setLoadingSlots(false);
          }
        };

        const handleSubmit = async () => {
          setSubmitting(true);
          try {
            const { error } = await supabase.from('appointments').insert([{
              full_name: clientDetails.full_name,
              email: clientDetails.email,
              phone: clientDetails.phone,
              service_id: selectedService.id,
              appointment_date: selectedDate,
              start_time: formatTime(selectedSlot.start),
              end_time: formatTime(selectedSlot.end),
              notes: clientDetails.notes,
              status: 'pending'
            }]);

            if (error) throw error;
            setStep(4); // Success
          } catch (err) {
            showToast(err.message, "error");
          } finally {
            setSubmitting(false);
          }
        };

        // Helper Helpers
        const timeToMinutes = (timeStr) => {
          const [h, m] = timeStr.split(':').map(Number);
          return h * 60 + m;
        };
        const formatTime = (mins) => {
          const h = Math.floor(mins / 60);
          const m = mins % 60;
          return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        };
        const getDates = () => {
          let dates = [];
          let today = new Date();
          // Show next 14 days
          for (let i = 0; i < 14; i++) {
            let d = new Date(today);
            d.setDate(today.getDate() + i + 1); // Start tomorrow
            dates.push(d);
          }
          return dates;
        };

        return (
          <div className="min-h-screen bg-charcoal py-24 px-4">
            <div className="max-w-4xl mx-auto">
              {/* Steps Indicator */}
              <div className="flex justify-center mb-12 gap-2">
                {[1, 2, 3].map(s => (
                  <div key={s} className={`h-1 flex-1 max-w-[100px] ${step >= s ? 'bg-amber-600' : 'bg-stone-800'} transition-colors`}></div>
                ))}
              </div>

              <div className="bg-surface border border-stone-800 p-8 md:p-12 shadow-2xl relative">
                <button onClick={onClose} className="absolute top-6 right-6 text-stone-500 hover:text-white"><Icon name="x" /></button>

                {step === 1 && (
                  <div className="slide-up">
                    <h2 className="text-3xl font-serif text-white mb-8">Select Service</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {/* Reusing context services, but assuming they are loaded */}
                      <ServiceListContextConsumer onSelect={setSelectedService} selected={selectedService} onNext={() => setStep(2)} />
                    </div>
                  </div>
                )}

                {step === 2 && (
                  <div className="slide-up">
                    <h2 className="text-3xl font-serif text-white mb-2">Select Date & Time</h2>
                    <p className="text-stone-400 mb-8">Service: <span className="text-amber-600">{selectedService.name}</span></p>

                    <div className="flex flex-col md:flex-row gap-8 h-[500px]">
                      {/* Date Selector */}
                      <div className="w-full md:w-1/3 overflow-y-auto pr-2 border-r border-stone-800">
                        <h3 className="text-sm uppercase tracking-widest text-stone-500 mb-4">Available Days</h3>
                        <div className="space-y-2">
                          {getDates().map((d, idx) => {
                            const dateStr = d.toISOString().split('T')[0];
                            const isSelected = selectedDate === dateStr;
                            const dayName = d.toLocaleDateString('en-US', { weekday: 'short' });
                            const dayNum = d.getDate();
                            return (
                              <button
                                key={idx}
                                onClick={() => { setSelectedDate(dateStr); setSelectedSlot(null); }}
                                className={`w-full p-4 text-left border transition-all ${isSelected ? 'bg-amber-900/20 border-amber-600 text-white' : 'bg-stone-900/50 border-stone-800 hover:border-stone-600 text-stone-400'}`}
                              >
                                <div className="text-xs uppercase font-bold opacity-60">{dayName}</div>
                                <div className="text-xl font-serif">{dayNum}</div>
                              </button>
                            );
                          })}
                        </div>
                      </div>

                      {/* Time Selector */}
                      <div className="w-full md:w-2/3">
                        <h3 className="text-sm uppercase tracking-widest text-stone-500 mb-4">Available Slots</h3>
                        {loadingSlots ? (
                          <div className="flex items-center justify-center h-full text-stone-500">Loading slots...</div>
                        ) : !selectedDate ? (
                          <div className="flex items-center justify-center h-full text-stone-600">Select a date</div>
                        ) : slots.length === 0 ? (
                          <div className="flex items-center justify-center h-full text-stone-600">No slots available.</div>
                        ) : (
                          <div className="grid grid-cols-3 gap-3 content-start overflow-y-auto max-h-[400px]">
                            {slots.map((slot, idx) => (
                              <button
                                key={idx}
                                onClick={() => setSelectedSlot(slot)}
                                className={`py-3 text-center text-sm border transition-colors ${selectedSlot === slot ? 'bg-amber-600 text-white border-amber-600' : 'bg-stone-900 border-stone-800 text-stone-300 hover:border-stone-600'}`}
                              >
                                {slot.label}
                              </button>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>

                    <div className="mt-8 flex justify-between">
                      <Button variant="ghost" onClick={() => setStep(1)}>Back</Button>
                      <Button onClick={() => setStep(3)} disabled={!selectedSlot}>Next Step</Button>
                    </div>
                  </div>
                )}

                {step === 3 && (
                  <div className="slide-up">
                    <h2 className="text-3xl font-serif text-white mb-8">Your Details</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                      <Input name="full_name" label="Full Name" value={clientDetails.full_name} onChange={e => setClientDetails({ ...clientDetails, full_name: e.target.value })} required />
                      <Input name="email" type="email" label="Email Address" value={clientDetails.email} onChange={e => setClientDetails({ ...clientDetails, email: e.target.value })} required />
                      <Input name="phone" type="tel" label="Phone Number" value={clientDetails.phone} onChange={e => setClientDetails({ ...clientDetails, phone: e.target.value })} required />
                      <div className="md:col-span-2">
                        <Input name="notes" label="Notes (Optional)" placeholder="Any specific requests?" value={clientDetails.notes} onChange={e => setClientDetails({ ...clientDetails, notes: e.target.value })} />
                      </div>
                    </div>

                    <div className="bg-stone-900/50 p-6 border border-stone-800 mb-8">
                      <h4 className="text-sm uppercase tracking-widest text-stone-500 mb-4">Booking Summary</h4>
                      <div className="flex justify-between text-white mb-2"><span>Service:</span> <span>{selectedService.name}</span></div>
                      <div className="flex justify-between text-white mb-2"><span>Date:</span> <span>{new Date(selectedDate).toDateString()}</span></div>
                      <div className="flex justify-between text-white mb-2"><span>Time:</span> <span>{selectedSlot.label}</span></div>
                      <div className="flex justify-between text-amber-600 font-bold text-lg mt-4 pt-4 border-t border-stone-800">
                        <span>Total</span>
                        <span>${selectedService.price}</span>
                      </div>
                    </div>

                    <div className="flex justify-between">
                      <Button variant="ghost" onClick={() => setStep(2)}>Back</Button>
                      <Button onClick={handleSubmit} disabled={submitting}>
                        {submitting ? 'Confirming...' : 'Confirm Booking'}
                      </Button>
                    </div>
                  </div>
                )}

                {step === 4 && (
                  <div className="text-center py-12 slide-up">
                    <div className="w-20 h-20 bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-6 text-green-500 border border-green-900">
                      <Icon name="check" size={40} />
                    </div>
                    <h2 className="text-3xl font-serif text-white mb-4">Booking Confirmed</h2>
                    <p className="text-stone-400 mb-8">We have reserved your chair. A confirmation email has been sent to {clientDetails.email}.</p>
                    <Button onClick={onClose}>Return Home</Button>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };

      // Helper sub-component to access context inside BookingFlow
      const ServiceListContextConsumer = ({ onSelect, selected, onNext }) => {
        const { services } = useContext(AppContext);
        return (
          <>
            {services.map(service => (
              <div
                key={service.id}
                onClick={() => onSelect(service)}
                className={`p-6 border cursor-pointer transition-all ${selected?.id === service.id ? 'bg-amber-900/20 border-amber-600' : 'bg-stone-900/50 border-stone-800 hover:border-stone-600'}`}
              >
                <div className="flex justify-between items-start mb-2">
                  <h4 className="text-xl font-serif text-white">{service.name}</h4>
                  <span className="text-amber-600 font-bold">${service.price}</span>
                </div>
                <p className="text-sm text-stone-400">{service.duration_minutes} min</p>
              </div>
            ))}
            <div className="md:col-span-2 mt-6 flex justify-end">
              <Button disabled={!selected} onClick={onNext}>Next</Button>
            </div>
          </>
        );
      };

      /*******************************************************
       * ADMIN DASHBOARD
       *******************************************************/
      const AdminLayout = ({ children }) => {
        const [view, setView] = useState('overview');
        const { signOut } = useContext(AppContext);

        const NavItem = ({ id, icon, label }) => (
          <button
            onClick={() => setView(id)}
            className={`w-full flex items-center gap-4 px-6 py-4 text-left transition-colors ${view === id ? 'bg-amber-900/20 text-amber-500 border-r-2 border-amber-600' : 'text-stone-400 hover:bg-stone-900 hover:text-white'}`}
          >
            <Icon name={icon} size={20} />
            <span className="font-medium">{label}</span>
          </button>
        );

        return (
          <div className="min-h-screen bg-[#0e0e0e] flex flex-col md:flex-row">
            {/* Sidebar */}
            <aside className="w-full md:w-64 bg-surface border-b md:border-b-0 md:border-r border-stone-800 flex-shrink-0 z-10">
              <div className="p-6 border-b border-stone-800">
                <span className="font-serif font-bold text-lg tracking-wide text-white">ADMIN PANEL</span>
              </div>
              <nav className="mt-4 space-y-1">
                <NavItem id="overview" icon="layout-dashboard" label="Overview" />
                <NavItem id="appointments" icon="calendar" label="Appointments" />
                <NavItem id="services" icon="scissors" label="Services" />
                <NavItem id="hours" icon="clock" label="Business Hours" />
                <NavItem id="blocked" icon="ban" label="Blocked Dates" />
                <NavItem id="settings" icon="settings" label="Settings" />
              </nav>
              <div className="mt-auto p-6 border-t border-stone-800">
                <Button onClick={() => signOut()} variant="ghost" className="w-full !justify-start">
                  <Icon name="log-out" size={18} /> Sign Out
                </Button>
              </div>
            </aside>

            {/* Main Content */}
            <main className="flex-1 p-6 md:p-10 overflow-y-auto">
              {React.Children.map(children, child => React.cloneElement(child, { view }))}
            </main>
          </div>
        );
      };

      const AdminContent = ({ view }) => {
        const {
          appointments, services, businessHours, blockedDates, settings,
          fetchAppointments, fetchServices, fetchHours, fetchBlockedDates, fetchSettings,
          supabase, showToast
        } = useContext(AppContext);

        // --- Overview ---
        if (view === 'overview') {
          const pendingCount = appointments.filter(a => a.status === 'pending').length;
          const todayCount = appointments.filter(a => a.appointment_date === new Date().toISOString().split('T')[0]).length;

          return (
            <div className="space-y-8 fade-in">
              <h2 className="text-3xl font-serif text-white">Dashboard Overview</h2>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div className="bg-surface border border-stone-800 p-6">
                  <div className="text-stone-500 text-sm uppercase font-bold mb-2">Pending Requests</div>
                  <div className="text-4xl font-serif text-amber-600">{pendingCount}</div>
                </div>
                <div className="bg-surface border border-stone-800 p-6">
                  <div className="text-stone-500 text-sm uppercase font-bold mb-2">Appointments Today</div>
                  <div className="text-4xl font-serif text-white">{todayCount}</div>
                </div>
                <div className="bg-surface border border-stone-800 p-6">
                  <div className="text-stone-500 text-sm uppercase font-bold mb-2">Active Services</div>
                  <div className="text-4xl font-serif text-white">{services.filter(s => s.is_active).length}</div>
                </div>
              </div>
            </div>
          );
        }

        // --- Appointments ---
        if (view === 'appointments') {
          const updateStatus = async (id, status) => {
            await supabase.from('appointments').update({ status }).eq('id', id);
            showToast("Appointment updated");
            fetchAppointments();
          };

          return (
            <div className="fade-in space-y-6">
              <div className="flex justify-between items-end">
                <h2 className="text-3xl font-serif text-white">Appointments</h2>
                <div className="flex gap-2">
                  <span className="px-3 py-1 bg-amber-900/20 text-amber-600 text-xs rounded border border-amber-900/50">Pending</span>
                  <span className="px-3 py-1 bg-blue-900/20 text-blue-600 text-xs rounded border border-blue-900/50">Confirmed</span>
                </div>
              </div>
              <div className="bg-surface border border-stone-800 overflow-x-auto">
                <table className="w-full text-left">
                  <thead className="bg-stone-900 text-stone-400 text-xs uppercase tracking-wider">
                    <tr>
                      <th className="p-4">Date & Time</th>
                      <th className="p-4">Client</th>
                      <th className="p-4">Service</th>
                      <th className="p-4">Contact</th>
                      <th className="p-4">Status</th>
                      <th className="p-4">Actions</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-stone-800">
                    {appointments.map(apt => (
                      <tr key={apt.id} className="hover:bg-stone-800/50">
                        <td className="p-4 text-white">
                          <div>{apt.appointment_date}</div>
                          <div className="text-stone-500 text-sm">{apt.start_time}</div>
                        </td>
                        <td className="p-4 text-white font-medium">{apt.full_name}</td>
                        <td className="p-4 text-stone-300">{apt.services?.name || 'Unknown'}</td>
                        <td className="p-4 text-stone-400 text-sm">
                          <div>{apt.email}</div>
                          <div>{apt.phone}</div>
                        </td>
                        <td className="p-4">
                          <span className={`px-2 py-1 text-xs rounded border ${apt.status === 'pending' ? 'bg-amber-900/20 text-amber-600 border-amber-900/50' :
                              apt.status === 'confirmed' ? 'bg-blue-900/20 text-blue-600 border-blue-900/50' :
                                apt.status === 'completed' ? 'bg-green-900/20 text-green-600 border-green-900/50' :
                                  'bg-red-900/20 text-red-600 border-red-900/50'
                            }`}>
                            {apt.status}
                          </span>
                        </td>
                        <td className="p-4">
                          <div className="flex gap-2">
                            {apt.status !== 'confirmed' && apt.status !== 'completed' && (
                              <button onClick={() => updateStatus(apt.id, 'confirmed')} className="p-2 hover:bg-green-900/30 text-green-500 rounded" title="Confirm"><Icon name="check" size={16} /></button>
                            )}
                            {apt.status !== 'cancelled' && apt.status !== 'completed' && (
                              <button onClick={() => updateStatus(apt.id, 'cancelled')} className="p-2 hover:bg-red-900/30 text-red-500 rounded" title="Cancel"><Icon name="x" size={16} /></button>
                            )}
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          );
        }

        // --- Services ---
        if (view === 'services') {
          const [editing, setEditing] = useState(null);

          const saveService = async (serviceData) => {
            if (serviceData.id) {
              await supabase.from('services').update(serviceData).eq('id', serviceData.id);
            } else {
              await supabase.from('services').insert([serviceData]);
            }
            setEditing(null);
            fetchServices();
            showToast("Service saved");
          };

          return (
            <div className="fade-in">
              <div className="flex justify-between items-center mb-6">
                <h2 className="text-3xl font-serif text-white">Services</h2>
                <Button onClick={() => setEditing({})}>Add Service</Button>
              </div>
              <div className="space-y-4">
                {services.map(s => (
                  <div key={s.id} className="bg-surface border border-stone-800 p-4 flex justify-between items-center">
                    <div>
                      <div className="flex items-center gap-3">
                        <span className={`w-2 h-2 rounded-full ${s.is_active ? 'bg-green-500' : 'bg-stone-600'}`}></span>
                        <h3 className="text-lg font-serif text-white">{s.name}</h3>
                        <span className="text-amber-600 font-bold text-sm">${s.price}</span>
                      </div>
                      <p className="text-stone-500 text-sm mt-1">{s.duration_minutes} min • {s.description}</p>
                    </div>
                    <Button variant="ghost" onClick={() => setEditing(s)}><Icon name="edit-2" size={16} /> Edit</Button>
                  </div>
                ))}
              </div>

              <Modal isOpen={!!editing} onClose={() => setEditing(null)} title={editing?.id ? 'Edit Service' : 'New Service'}>
                <ServiceForm initialData={editing} onSave={saveService} onCancel={() => setEditing(null)} />
              </Modal>
            </div>
          );
        }

        // --- Business Hours ---
        if (view === 'hours') {
          const saveHours = async (updatedHours) => {
            await supabase.from('business_hours').upsert(updatedHours);
            fetchHours();
            showToast("Hours updated");
          };

          return (
            <div className="fade-in max-w-2xl">
              <h2 className="text-3xl font-serif text-white mb-6">Business Hours</h2>
              <div className="bg-surface border border-stone-800 p-6 space-y-4">
                {['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'].map((day, idx) => {
                  const dayData = businessHours.find(h => h.weekday === idx) || { weekday: idx, is_open: false, start_time: '09:00', end_time: '17:00' };
                  return (
                    <div key={idx} className="flex items-center gap-4 py-2 border-b border-stone-800 last:border-0">
                      <div className="w-32 font-medium text-stone-300">{day}</div>
                      <label className="flex items-center gap-2 cursor-pointer">
                        <input
                          type="checkbox"
                          checked={dayData.is_open}
                          onChange={(e) => saveHours({ ...dayData, is_open: e.target.checked })}
                          className="accent-amber-600 w-4 h-4"
                        />
                        <span className="text-sm text-stone-500">Open</span>
                      </label>
                      {dayData.is_open && (
                        <div className="flex gap-2 items-center ml-auto">
                          <input
                            type="time"
                            value={dayData.start_time}
                            onChange={(e) => saveHours({ ...dayData, start_time: e.target.value })}
                            className="bg-stone-900 border border-stone-700 text-white px-2 py-1 rounded text-sm"
                          />
                          <span className="text-stone-600">-</span>
                          <input
                            type="time"
                            value={dayData.end_time}
                            onChange={(e) => saveHours({ ...dayData, end_time: e.target.value })}
                            className="bg-stone-900 border border-stone-700 text-white px-2 py-1 rounded text-sm"
                          />
                        </div>
                      )}
                    </div>
                  )
                })}
              </div>
            </div>
          );
        }

        // --- Settings ---
        if (view === 'settings') {
          const [formData, setFormData] = useState(settings || {});

          const handleSave = async () => {
            await supabase.from('barbershop_settings').upsert(formData);
            fetchSettings();
            showToast("Settings saved");
          };

          return (
            <div className="fade-in max-w-2xl">
              <h2 className="text-3xl font-serif text-white mb-6">Barbershop Settings</h2>
              <div className="bg-surface border border-stone-800 p-8 space-y-6">
                <Input label="Barbershop Name" name="barbershop_name" value={formData.barbershop_name || ''} onChange={e => setFormData({ ...formData, barbershop_name: e.target.value })} />
                <Input label="Email" name="barbershop_email" value={formData.barbershop_email || ''} onChange={e => setFormData({ ...formData, barbershop_email: e.target.value })} />
                <Input label="Phone" name="barbershop_phone" value={formData.barbershop_phone || ''} onChange={e => setFormData({ ...formData, barbershop_phone: e.target.value })} />
                <Input label="Address" name="barbershop_address" value={formData.barbershop_address || ''} onChange={e => setFormData({ ...formData, barbershop_address: e.target.value })} />

                <div className="grid grid-cols-2 gap-4">
                  <Input label="Slot Interval (mins)" name="slot_interval_minutes" type="number" value={formData.slot_interval_minutes || 15} onChange={e => setFormData({ ...formData, slot_interval_minutes: parseInt(e.target.value) })} />
                  <Input label="Booking Notice (hours)" name="booking_notice_hours" type="number" value={formData.booking_notice_hours || 2} onChange={e => setFormData({ ...formData, booking_notice_hours: parseInt(e.target.value) })} />
                </div>

                <div className="pt-4">
                  <Button onClick={handleSave}>Save Changes</Button>
                </div>
              </div>
            </div>
          );
        }

        return null;
      };

      const ServiceForm = ({ initialData, onSave, onCancel }) => {
        const [formData, setFormData] = useState(initialData);
        return (
          <form onSubmit={(e) => { e.preventDefault(); onSave(formData); }} className="space-y-4">
            <Input label="Service Name" value={formData.name || ''} onChange={e => setFormData({ ...formData, name: e.target.value })} required />
            <div className="grid grid-cols-2 gap-4">
              <Input label="Price ($)" type="number" value={formData.price || ''} onChange={e => setFormData({ ...formData, price: parseFloat(e.target.value) })} required />
              <Input label="Duration (min)" type="number" value={formData.duration_minutes || ''} onChange={e => setFormData({ ...formData, duration_minutes: parseInt(e.target.value) })} required />
            </div>
            <div>
              <label className="text-xs uppercase tracking-widest text-stone-500 font-bold block mb-2">Description</label>
              <textarea
                className="w-full bg-stone-900 border border-stone-700 text-white p-3 rounded h-24 focus:outline-none focus:border-amber-700"
                value={formData.description || ''}
                onChange={e => setFormData({ ...formData, description: e.target.value })}
              ></textarea>
            </div>
            <div className="flex items-center gap-2 py-2">
              <input
                type="checkbox"
                id="is_active"
                checked={formData.is_active !== false}
                onChange={e => setFormData({ ...formData, is_active: e.target.checked })}
                className="accent-amber-600"
              />
              <label htmlFor="is_active" className="text-stone-300">Active (Visible on website)</label>
            </div>
            <div className="pt-4 flex justify-end gap-3">
              <Button variant="ghost" onClick={onCancel}>Cancel</Button>
              <Button type="submit">Save Service</Button>
            </div>
          </form>
        );
      };

      /*******************************************************
       * MAIN APP & ROUTING
       *******************************************************/
      const ConfigModal = ({ isOpen, onClose, onSave }) => {
        const [url, setUrl] = useState(localStorage.getItem('sb_url') || '');
        const [key, setKey] = useState(localStorage.getItem('sb_key') || '');

        const handleSave = () => {
          localStorage.setItem('sb_url', url);
          localStorage.setItem('sb_key', key);
          onSave();
        };

        return (
          <Modal isOpen={isOpen} onClose={onClose} title="Configure Database">
            <p className="text-stone-400 mb-6 text-sm">Enter your Supabase project credentials to connect the backend.</p>
            <div className="space-y-4">
              <Input label="Project URL" placeholder="https://xyz.supabase.co" value={url} onChange={e => setUrl(e.target.value)} />
              <Input label="Anon Key" placeholder="eyJh..." value={key} onChange={e => setKey(e.target.value)} />
            </div>
            <div className="mt-8 flex justify-end">
              <Button onClick={handleSave}>Connect</Button>
            </div>
          </Modal>
        );
      };

      const App = () => {
        const { loading, isAdmin, user, showToast, supabase } = useContext(AppContext);
        const [view, setView] = useState('home'); // home, booking, admin-login, admin
        const [selectedService, setSelectedService] = useState(null);
        const [showConfig, setShowConfig] = useState(!localStorage.getItem('sb_url'));

        const handleLogin = async (e) => {
          e.preventDefault();
          const formData = new FormData(e.target);
          const email = formData.get('email');
          const password = formData.get('password');

          const { error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) {
            showToast(error.message, 'error');
          }
        };

        if (loading) return <div className="h-screen flex items-center justify-center bg-charcoal text-stone-500">Loading...</div>;

        if (isAdmin || view === 'admin') {
          if (!isAdmin && view === 'admin') setView('admin-login'); // Guard
          return <AdminLayout><AdminContent view={view === 'admin' ? 'overview' : view} /></AdminLayout>;
        }

        if (view === 'admin-login') {
          return (
            <div className="min-h-screen flex items-center justify-center bg-charcoal p-4">
              <div className="bg-surface border border-stone-800 p-8 w-full max-w-md shadow-2xl slide-up">
                <h2 className="text-2xl font-serif text-white text-center mb-8">Admin Access</h2>
                <form onSubmit={handleLogin} className="space-y-6">
                  <Input label="Email" name="email" type="email" required />
                  <Input label="Password" name="password" type="password" required />
                  <Button type="submit" className="w-full">Sign In</Button>
                </form>
                <div className="mt-6 text-center">
                  <button onClick={() => setView('home')} className="text-stone-500 hover:text-white text-sm">Back to Website</button>
                </div>
              </div>
            </div>
          );
        }

        if (view === 'booking') {
          return <BookingFlow initialService={selectedService} onClose={() => setView('home')} />;
        }

        return (
          <div className="bg-charcoal min-h-screen text-white">
            <ConfigModal
              isOpen={showConfig}
              onClose={() => window.location.reload()}
              onSave={() => window.location.reload()}
            />

            <Navbar onBookClick={() => setView('booking')} />

            <main>
              <Hero onBookClick={() => setView('booking')} />
              <Services onSelectService={(s) => { setSelectedService(s); setView('booking'); }} />
              <About />

              <footer className="bg-surface border-t border-stone-800 py-12 px-6 text-center text-stone-500 text-sm">
                <p>&copy; {new Date().getFullYear()} {user?.user_metadata?.barbershop_name || 'The Grooming Lounge'}. All rights reserved.</p>
                <div className="mt-4 space-x-4">
                  <button onClick={() => setView('admin-login')} className="hover:text-amber-600 transition-colors">Staff Login</button>
                </div>
              </footer>
            </main>
          </div>
        );
      };

      const Root = () => (
        <AppProvider>
          <App />
          <ToastWrapper />
        </AppProvider>
      );

      const ToastWrapper = () => {
        const { toast } = useContext(AppContext);
        if (!toast) return null;
        return <Toast message={toast.message} type={toast.type} />;
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<Root />);
    </script>
  </body>

</html>
